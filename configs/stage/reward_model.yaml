# Reward model training stage
name: reward_model

training:
  num_train_epochs: 1
  per_device_train_batch_size: 2
  effective_batch_size: 16
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  logging_steps: 10
  save_steps: 100
  save_total_limit: 2
  report_to: wandb
  resume_from_checkpoint: null
