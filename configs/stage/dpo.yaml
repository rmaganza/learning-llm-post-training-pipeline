# DPO (Direct Preference Optimization) stage
name: dpo

training:
  num_train_epochs: 1
  per_device_train_batch_size: 2
  effective_batch_size: 16
  learning_rate: 5.0e-7
  weight_decay: 0.01
  warmup_ratio: 0.1
  logging_steps: 10
  save_steps: 100
  save_total_limit: 2
  report_to: wandb
  resume_from_checkpoint: null

dpo:
  beta: 0.1
  loss_type: sigmoid  # sigmoid, hinge, ipo, etc.
