# Main Hydra configuration for LLM post-training pipeline
# Usage: python train.py model=0.5b stage=sft dataset=alpaca
# Override: python train.py model=1b stage=dpo model.lora.rank=32

defaults:
  - _self_
  - model: 0.5b
  - stage: sft
  - dataset: alpaca

# Global settings
seed: 42
output_dir: ./outputs
run_name: null  # Auto-generated if null

# Hydra run directory
hydra:
  run:
    dir: ${output_dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}-${stage.name}
  job:
    chdir: false  # Keep CWD for relative paths (datasets/, etc.)
  sweep:
    dir: ${output_dir}/multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${stage.name}
